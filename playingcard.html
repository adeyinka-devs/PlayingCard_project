<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Card</title>
  <link rel="stylesheet" href="playingcard.css">
</head>
<body>
  <main id="playing-cards">
    <div class="card first">
      <div class="left">
         <div>A</div>
         <div>♠</div>
      </div>
      <div class="middle">
        <div>♠</div>
      </div>
      <div class="right invert">
        <div>A</div>
        <div>♠</div>
      </div>
    </div>

    <div class="card second">
      <div class="left">
        <div>2</div>
        <div>♣</div>
      </div>
      <div class="middle">
         <div>♣</div>
         <div>♣</div>
      </div>
      <div class="right invert">
        <div>2</div>
        <div>♣</div>
      </div>
    </div>

    <div class="card third">
      <div class="left">
        <div>3</div>
        <div>♥</div>
      </div>
      <div class="middle">
         <div>♥</div>
         <div>♥</div>
         <div>♥</div>
      </div>
      <div class="right invert">
        <div>3</div>
        <div>♥</div>
      </div>
    </div>

    <div class="card fourth">
      <div class="left">
        <div>4</div>
        <div>♣</div>
      </div>
      <div class="middle">
         <div>♣♣</div>
         <div>♣♣</div>
      </div>
      <div class="right invert">
        <div>4</div>
        <div>♣</div>
      </div>
  </div>

      <div class="card fifth">
      <div class="left">
        <div>5</div>
        <div>♦</div>
      </div>
      <div class="middle">
         <div>♦♦</div>
         <div class="five">♦</div>
         <div>♦♦</div>
      </div>
      <div class="right invert">
        <div>5</div>
        <div>♦</div>
      </div>
    </div>
  </main>
</body>
</html>
